<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; font-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NDSD 대체조제 업로더</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        color: #131b2e;
        background: #faf8ff;
        letter-spacing: -0.005em;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        height: 100vh;
      }
      button {
        font-family: inherit;
      }
      input,
      select,
      textarea {
        font-family: inherit;
        color: inherit;
      }
      /* 숨김형 스크롤바 — 필요할 때만 은은하게 */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(19, 27, 46, 0.12);
        border-radius: 999px;
        border: 3px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(19, 27, 46, 0.22);
        background-clip: padding-box;
        border: 3px solid transparent;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes pulseRing {
        0% {
          transform: scale(0.9);
          opacity: 0.5;
        }
        70% {
          transform: scale(1.15);
          opacity: 0;
        }
        100% {
          transform: scale(1.15);
          opacity: 0;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
